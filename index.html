<!DOCTYPE html>
<html lang="en-us">
  <head>
    <meta charset="utf-8">
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
    <title>Unity WebGL Player | WebGL Loader Tutorial Build</title>
    <link rel="shortcut icon" href="TemplateData/favicon.ico">
    <link rel="stylesheet" href="TemplateData/style.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Anton">
  </head>
  <body>
    <div id="unity-container" class="unity-desktop">
      <canvas id="unity-canvas" width=100% height=100%></canvas>
      <div id="unity-custom-loading-screen">
        <div id="custom-logo-background">
            <div class="progress-container">
              <div class="progress-box">
                <div class="progress-fill"></div>
              </div>
              <div class="progress-state state-load">Loading…</div>
              <div class="progress-state state-finish">Complete!</div>
            </div>
            <div class="dump-truck">
              <div class="front"></div>
              <div class="bucket"></div>
              <div class="dirt">
                <div class="dirt-spill"></div>
              </div>
              <div class="base"></div>
              <div class="wheel wheel-front"></div>
              <div class="wheel wheel-middle"></div>
              <div class="wheel wheel-back"></div>
            </div>
            <div class="dump-truck">
              <div class="front"></div>
              <div class="bucket"></div>
              <div class="dirt">
                <div class="dirt-spill"></div>
              </div>
              <div class="base"></div>
              <div class="wheel wheel-front"></div>
              <div class="wheel wheel-middle"></div>
              <div class="wheel wheel-back"></div>
            </div>
        </div>
      <div id="unity-warning"> </div>
      <div id="unity-footer">
        <div id="unity-webgl-logo"></div>
        <div id="unity-fullscreen-button"></div>
        <div id="unity-build-title">English H</div>
      </div>
    </div>
    <script src='JsCursorLockChangeHandler.js'></script>
    <script>
      var container = document.querySelector("#unity-container");
      var canvas = document.querySelector("#unity-canvas");
      var loadingScreen = document.querySelector("#unity-custom-loading-screen");
      var customLoadingBar = document.querySelector("#custom-loader");
      var fullscreenButton = document.querySelector("#unity-fullscreen-button");
      var warningBanner = document.querySelector("#unity-warning");

      // Shows a temporary message banner/ribbon for a few seconds, or
      // a permanent error message on top of the canvas if type=='error'.
      // If type=='warning', a yellow highlight color is used.
      // Modify or remove this function to customize the visually presented
      // way that non-critical warnings and error messages are presented to the
      // user.
      function unityShowBanner(msg, type) {
        function updateBannerVisibility() {
          warningBanner.style.display = warningBanner.children.length ? 'block' : 'none';
        }
        var div = document.createElement('div');
        div.innerHTML = msg;
        warningBanner.appendChild(div);
        if (type == 'error') div.style = 'background: red; padding: 10px;';
        else {
          if (type == 'warning') div.style = 'background: yellow; padding: 10px;';
          setTimeout(function() {
            warningBanner.removeChild(div);
            updateBannerVisibility();
          }, 5000);
        }
        updateBannerVisibility();
      }

      var buildUrl = "Build";
      var loaderUrl = buildUrl + "/WebGL Build.loader.js";
      var config = {
        dataUrl: buildUrl + "/WebGL Build.data.unityweb",
        frameworkUrl: buildUrl + "/WebGL Build.framework.js.unityweb",
        codeUrl: buildUrl + "/WebGL Build.wasm.unityweb",
        streamingAssetsUrl: "StreamingAssets",
        companyName: "DefaultCompany",
        productName: "English H",
        productVersion: "0.1.0",
        showBanner: unityShowBanner,
      };

      // By default Unity keeps WebGL canvas render target size matched with
      // the DOM size of the canvas element (scaled by window.devicePixelRatio)
      // Set this to false if you want to decouple this synchronization from
      // happening inside the engine, and you would instead like to size up
      // the canvas DOM size and WebGL render target sizes yourself.
      // config.matchWebGLToCanvasSize = false;

      if (/iPhone|iPad|iPod|Android/i.test(navigator.userAgent)) {
        container.className = "unity-mobile";
        // Avoid draining fillrate performance on mobile devices,
        // and default/override low DPI mode on mobile browsers.
        config.devicePixelRatio = 1.8;
        unityShowBanner('WebGL builds are not supported on mobile devices.');
      } else {
        canvas.style.width = "100%";
        canvas.style.height = "100%";
        config.devicePixelRatio = 1.3;
      }
      loadingScreen.style.display = "block";
      document.addEventListener("pointerlockchange", lockChangeAlert, false);

      function lockChangeAlert() {
        if (document.pointerLockElement === canvas) {
          console.log("The pointer lock status is now locked");
          // Do something useful in response
        } else {
          console.log("The pointer lock status is now unlocked");
          // Do something useful in response
        }
      }
      
      var loadingProgress;
      var script = document.createElement("script");
      script.src = loaderUrl;
      script.onload = () => {
        createUnityInstance(canvas, config, (progress) => {
          
          // unitySetLoaderProgressTo(progress);
        }).then((unityInstance) => {
          setTimeout(function() {
            loadingScreen.style.display = "none";
          },2100);
          fullscreenButton.onclick = () => {
            unityInstance.SetFullscreen(1);
          };
        }).catch((message) => {
          alert(message);
        });
      };
      document.body.appendChild(script);

      // value - 0 to 1
      function unitySetLoaderProgressTo(value)
      {
        const fill = customLoadingBar.getElementsByClassName("fill")[0];
        const fillText = customLoadingBar.getElementsByClassName("label")[0];

        fill.animate(
          [
            { width: (value * 100) + "%" }
          ],
          {
            duration: 300,
            fill: "forwards"
          }
        );

        fillText.textContent = (value * 100).toFixed() + "%";
      }

      // trucks
      window.addEventListener("DOMContentLoaded", loading)
      function loading() {
        var percents = [0.25,0.5,0.75,1],
                step = 0,
                truckLoopDur = 10,
                fill = function() {
                  let fillEl = document.querySelector(".progress-fill");
                  fillEl.style.transform = "scaleY(" + percents[step] + ")";
                  ++step;

                  if (step < percents.length) {
                    setTimeout(fill, (truckLoopDur * 1e3)/2);
                  }
                };
        setTimeout(fill, (truckLoopDur * 1e3)/4);
      }
    </script>
  </body>
</html>
